<!DOCTYPE html>
<html>
<head>
    <title>Мой профиль</title>

    <style>
        body{
            font-family: Arial;
            background-color: white;
        }

        .profile{
            width: 700px;
            margin: auto;
            padding: 20px;
        }

        img{
            width: 150px;
            height: 150px;
            border-radius: 50%;
        }

        .stats{
            margin-top: 20px;
            font-size: 20px;
        }

        .bio{
            margin-top: 20px;
            font-size: 22px;
        }

        .status{
            color: blue;
        }

        .photo{
            width: 200px;
            height: 200px;
            border-radius: 0;
            margin: 5px;
        }

        button{
            padding: 10px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="profile">

    <img src="https://via.placeholder.com/150">

    <h1>Онгонусов Тамерлан</h1>

    <div class="stats">
        <p><b>2</b> публикации</p>
        <p><b>10</b> подписчиков</p>
        <p><b>3</b> подписки</p>
    </div>

    <div class="bio">
        <p class="status">Бизнесмен</p>

        <p>Мысли: деньги</p>

        <p>Идеи: создать компанию</p>
    </div>

    <button>Подписаться</button>
    <button>Сообщение</button>

    <h2>Публикации</h2>

    <img class="photo" src="https://via.placeholder.com/200">
    <img class="photo" src="https://via.placeholder.com/200">

</div>

</body>
</html>
